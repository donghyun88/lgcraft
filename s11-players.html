  <script>
    const K_VALUES = { 개인전: 32, '22': 24, '33': 16 };

    function emptyStats() {
      return {
        total: { w: 0, l: 0 },
        개인전: { w: 0, l: 0 },
        팀전: { w: 0, l: 0 },
        '22': { w: 0, l: 0 },
        '33': { w: 0, l: 0 },
      };
    }

    function statKeysForFormat(format) {
      const keys = ['total'];
      if (format === '1v1') {
        keys.push('개인전');
        return keys;
      }
      if (format === '2v2') {
        keys.push('팀전', '22');
        return keys;
      }
      if (format === '3v3') {
        keys.push('팀전', '33');
        return keys;
      }
      keys.push('팀전');
      return keys;
    }

    function bumpStats(stats, format, won) {
      for (const k of statKeysForFormat(format)) {
        if (won) stats[k].w++;
        else stats[k].l++;
      }
    }

    function updateEloPair(elo1, elo2, result, k) {
      const expected = 1 / (1 + 10 ** ((elo2 - elo1) / 400));
      const delta = Math.round(k * (result - expected));
      return { d1: delta, d2: -delta };
    }

    function kForFormat(format) {
      if (format === '2v2') return K_VALUES['22'];
      if (format === '3v3') return K_VALUES['33'];
      return K_VALUES.개인전;
    }

    async function loadJson(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(path + ' ' + res.status);
      return res.json();
    }

    async function loadRoundResultDoc(roundNum) {
      const p = String(roundNum).padStart(2, '0');
      for (const url of [`data/s11/results/round-${p}.json`, `data/s11/results/round-${p}.sample.json`]) {
        const res = await fetch(url, { cache: 'no-store' });
        if (res.ok) return res.json();
      }
      return null;
    }

    async function fetchPerMatchResultDoc(fixtureId) {
      const url = `data/s11/results/${fixtureId}.json`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) return null;
      return res.json();
    }

    function matchupFromPerMatchDoc(doc, fixtureId) {
      if (!doc || !Array.isArray(doc.matchups)) return null;
      return doc.matchups.find((x) => x.fixtureId === fixtureId) || null;
    }

    async function mergePerMatchOverlaysIntoRoundDoc(baseDoc, roundNum, fixtures) {
      const rd = (fixtures.rounds || []).find((x) => x.round === roundNum);
      const fixtureIds = (rd && rd.matchups ? rd.matchups.map((m) => m.id).filter(Boolean) : []) || [];
      const overlays = new Map();
      await Promise.all(
        fixtureIds.map(async (fid) => {
          const pm = await fetchPerMatchResultDoc(fid);
          const mu = matchupFromPerMatchDoc(pm, fid);
          if (mu) overlays.set(fid, mu);
        }),
      );
      if (!overlays.size && !baseDoc) return null;

      const out = baseDoc
        ? JSON.parse(JSON.stringify(baseDoc))
        : {
            schemaVersion: 1,
            season: 11,
            phase: fixtures.phase || 'first_half',
            round: roundNum,
            recordedAt: '',
            author: '',
            notes: '',
            matchups: [],
          };
      if (!Array.isArray(out.matchups)) out.matchups = [];

      if (baseDoc) {
        for (const [fid, mu] of overlays) {
          const idx = out.matchups.findIndex((x) => x.fixtureId === fid);
          if (idx >= 0) out.matchups[idx] = mu;
          else out.matchups.push(mu);
        }
      } else {
        const ordered = [];
        for (const fid of fixtureIds) {
          const mu = overlays.get(fid);
          if (mu) ordered.push(mu);
        }
        out.matchups = ordered;
      }
      return out;
    }

    async function loadRoundResultDocMerged(roundNum, fixtures) {
      const base = await loadRoundResultDoc(roundNum);
      return mergePerMatchOverlaysIntoRoundDoc(base, roundNum, fixtures);
    }

    async function loadAllRoundResults(maxRound, fixtures) {
      const docs = [];
      for (let r = 1; r <= maxRound; r++) {
        const doc = await loadRoundResultDocMerged(r, fixtures);
        if (doc) docs.push(doc);
      }
      return docs;
    }

    function fixtureRoundMap(fixtures, roundNum) {
      const rd = (fixtures.rounds || []).find((x) => x.round === roundNum);
      if (!rd) return new Map();
      const m = new Map();
      for (const mu of rd.matchups || []) m.set(mu.id, mu);
      return m;
    }

    function slotPlanBySlot(fixtures, roundNum) {
      const rd = (fixtures.rounds || []).find((x) => x.round === roundNum);
      const m = new Map();
      if (!rd || !rd.slotPlan) return m;
      for (const s of rd.slotPlan) m.set(s.slot, s);
      return m;
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function teamName(meta, id) {
      const t = meta.teams.find((x) => x.id === id);
      return t ? t.name : id;
    }

    function getRaceLetter(p) {
      return (p.tierSheetMainRace || p.raceDefault || '').trim() || '';
    }

    function raceKo(letter) {
      const m = { Z: '저', T: '테', P: '토', R: '랜' };
      return m[letter] || letter || '';
    }

    /** 개인전 상대종족별 픽 — 칩 HTML (없으면 빈 문자열). opts.compact: 목록 종족란용 소형 */
    function renderRaceVsOpponentChips(p, opts) {
      const map = p && p.raceVsOpponent;
      if (!map || typeof map !== 'object') return '';
      const compact = !!(opts && opts.compact);
      const chipCls = compact
        ? 'inline-flex items-center gap-px rounded border border-violet-200/65 bg-violet-50/85 px-1 py-px text-[9px] font-bold text-violet-900 leading-tight'
        : 'inline-flex items-center gap-0.5 rounded-md bg-violet-50 border border-violet-200/80 px-1.5 py-0.5 text-[10px] font-bold text-violet-900';
      const order = ['Z', 'T', 'P', 'R'];
      const parts = [];
      for (const opp of order) {
        if (!Object.prototype.hasOwnProperty.call(map, opp)) continue;
        const pick = map[opp];
        if (pick == null || pick === '') continue;
        const pc = String(pick).toUpperCase().charAt(0);
        if (!['Z', 'T', 'P', 'R'].includes(opp) || !['Z', 'T', 'P', 'R'].includes(pc)) continue;
        parts.push(
          `<span class="${chipCls}">${getRaceIcon(opp)}<span>${raceKo(opp)}</span><span class="text-violet-500 font-extrabold">→</span>${getRaceIcon(pc)}<span>${raceKo(pc)}</span></span>`,
        );
      }
      if (!parts.length) return '';
      const joined = parts.join('');
      return compact ? `<span class="choice-chip-compact inline-flex flex-wrap gap-0.5 max-w-[11rem]">${joined}</span>` : joined;
    }

    function renderRaceVsOpponentBlock(p) {
      const chips = renderRaceVsOpponentChips(p);
      if (!chips) return '';
      const note = p.raceNotes && String(p.raceNotes).trim() ? `<p class="mt-1.5 text-[10px] text-violet-700/90 leading-snug">${escapeHtml(p.raceNotes.trim())}</p>` : '';
      return `<div class="mt-2 pt-2 border-t border-violet-100/80">
        <p class="text-[10px] font-bold uppercase tracking-wide text-violet-600 mb-1">개인전 초이스</p>
        <div class="flex flex-wrap gap-1">${chips}</div>${note}</div>`;
    }

    /** 상대 이름 옆 종족 아이콘 (세트 기록용) */
    function formatOpponentsWithRaces(names, races) {
      if (!names || !names.length) return '—';
      const rarr = races || [];
      return names
        .map((n, i) => {
          const r = rarr[i];
          const iconHtml = r && ['Z', 'T', 'P', 'R'].includes(r) ? `<span class="inline-flex shrink-0 opacity-90">${getRaceIcon(r)}</span>` : '';
          return `<span class="inline-flex items-center gap-0.5">${escapeHtml(n)}${iconHtml}</span>`;
        })
        .join('<span class="text-zinc-300 mx-0.5">·</span>');
    }

    function opponentRacesFromSlotRows(slotRows, nameList, rosterMap) {
      return (nameList || []).map((nm) => {
        const row = (slotRows || []).find((r) => (r.displayName || '').trim() === nm);
        return oppRaceZtp(row || {}, rosterMap, nm) || '';
      });
    }

    function getRaceIcon(race) {
      if (!race) return '';
      const c = race.charAt(0);
      return `<span class="race-icon race-${race}">${escapeHtml(c)}</span>`;
    }

    function wlCell(s) {
      return `${s.w}승 ${s.l}패`;
    }

    function rosterByDisplayName(players) {
      const m = new Map();
      for (const p of players || []) {
        const dn = (p.displayName || '').trim();
        if (dn) m.set(dn, p);
      }
      return m;
    }

    /** 1v1만: 맵 이름 → { w, l } */
    function bumpMapSimple(perMap, mapName, won) {
      if (!mapName || mapName === '—') return;
      if (!perMap[mapName]) perMap[mapName] = { w: 0, l: 0 };
      if (won) perMap[mapName].w++;
      else perMap[mapName].l++;
    }

    function emptyVsOppRace() {
      return { Z: { w: 0, l: 0 }, T: { w: 0, l: 0 }, P: { w: 0, l: 0 } };
    }

    function emptyTeamMapStats() {
      return { '2v2': {}, '3v3': {} };
    }

    /** 슬롯 줄·이름으로 상대 종족 표시용 문자. 집계(bumpVsOppRace)는 Z/T/P만 사용. */
    function oppRaceZtp(row, rosterMap, displayName) {
      const raw = row?.race && String(row.race).trim().toUpperCase();
      if (raw) {
        const c = raw.charAt(0);
        if (c === 'Z' || c === 'T' || c === 'P' || c === 'R') return c;
        return null;
      }
      const p = rosterMap.get((displayName || '').trim());
      const letter = getRaceLetter(p || {});
      return letter === 'Z' || letter === 'T' || letter === 'P' || letter === 'R' ? letter : null;
    }

    function bumpVsOppRace(vs, oppRace, won) {
      if (!oppRace || !vs[oppRace]) return;
      if (won) vs[oppRace].w++;
      else vs[oppRace].l++;
    }

    function bumpTeamMap(teamMapStats, format, mapName, won) {
      if (!mapName || mapName === '—') return;
      const bucketKey = format === '2v2' ? '2v2' : format === '3v3' ? '3v3' : null;
      if (!bucketKey) return;
      const bucket = teamMapStats[bucketKey];
      if (!bucket[mapName]) bucket[mapName] = { w: 0, l: 0 };
      if (won) bucket[mapName].w++;
      else bucket[mapName].l++;
    }

    /** ELO 반영 순서: playedOrder 가 있으면 실제 진행 순, 없으면 슬롯 번호 순 */
    function slotsInPlayedOrder(mu) {
      const slots = [...(mu.slots || [])];
      const po = mu.playedOrder;
      if (!Array.isArray(po) || !po.length) {
        return slots.sort((a, b) => (a.slot || 0) - (b.slot || 0));
      }
      const bySlot = new Map(slots.map((s) => [s.slot, s]));
      const ordered = [];
      for (const slotNum of po) {
        const sl = bySlot.get(slotNum);
        if (sl) ordered.push(sl);
      }
      for (const sl of slots) {
        if (!ordered.includes(sl)) ordered.push(sl);
      }
      return ordered;
    }

    /**
     * 라운드 → 대전 → (playedOrder 또는 슬롯 번호) 순으로 ELO·통계 반영
     * @returns {{ statsByName: object, stateByName: Map }}
     */
    function simulateSeason(fixtures, roundDocs, rosterPlayers) {
      const rosterMap = rosterByDisplayName(rosterPlayers);
      const statsByName = {};
      const stateByName = new Map();

      function ensure(name) {
        const n = (name || '').trim();
        if (!n) return null;
        if (!stateByName.has(n)) {
          const player = rosterMap.get(n) || { displayName: n, id: '', teamId: '' };
          stateByName.set(n, {
            displayName: n,
            player,
            elo: 1000,
            elo1v1: 1000,
            eloTeam: 1000,
            history: [],
            mapStats: {},
            vsOppRace: emptyVsOppRace(),
            teamMapStats: emptyTeamMapStats(),
          });
        }
        if (!statsByName[n]) statsByName[n] = emptyStats();
        return stateByName.get(n);
      }

      const sortedDocs = [...roundDocs].sort((a, b) => (a.round || 0) - (b.round || 0));
      let globalSeq = 0;

      for (const doc of sortedDocs) {
        const rnum = doc.round;
        if (rnum == null) continue;
        const byId = fixtureRoundMap(fixtures, rnum);
        const planBySlot = slotPlanBySlot(fixtures, rnum);

        for (const mu of doc.matchups || []) {
          const fix = byId.get(mu.fixtureId);
          if (!fix || !fix.teamIds || fix.teamIds.length < 2) continue;
          const [tA, tB] = fix.teamIds;
          const slots = slotsInPlayedOrder(mu);

          for (const sl of slots) {
            const w = sl.winnerTeamIndex;
            if (w !== 1 && w !== 2) continue;
            const team1Won = w === 1;
            const metaSlot = planBySlot.get(sl.slot) || {};
            const format = metaSlot.format || '1v1';
            const mapName = metaSlot.map || '—';
            const k = kForFormat(format);

            const namesA = (sl.teamA || []).map((r) => (r.displayName || '').trim()).filter(Boolean);
            const namesB = (sl.teamB || []).map((r) => (r.displayName || '').trim()).filter(Boolean);

            for (const nm of [...namesA, ...namesB]) ensure(nm);

            const bumpSide = (names, sideWon) => {
              for (const nm of names) bumpStats(statsByName[nm], format, sideWon);
            };
            bumpSide(namesA, team1Won);
            bumpSide(namesB, !team1Won);

            const record = (nm, eloBefore, delta, won, opponents, opponentRaces) => {
              const st = ensure(nm);
              if (!st) return;
              const eloAfter = eloBefore + delta;
              st.elo = eloAfter;
              const opps = opponents || [];
              const races =
                Array.isArray(opponentRaces) && opponentRaces.length === opps.length
                  ? opponentRaces
                  : opps.map(() => '');
              st.history.push({
                seq: ++globalSeq,
                round: rnum,
                fixtureId: mu.fixtureId,
                slot: sl.slot,
                map: mapName,
                format,
                tierLine: metaSlot.tierLine || '',
                won,
                delta,
                eloBefore,
                eloAfter,
                opponents: opps,
                opponentRaces: races,
                teamIds: [tA, tB],
              });
            };

            if (format === '1v1' && namesA.length >= 1 && namesB.length >= 1) {
              const n1 = namesA[0];
              const n2 = namesB[0];
              const s1 = ensure(n1);
              const s2 = ensure(n2);
              const e1 = s1.elo;
              const e2 = s2.elo;
              const e1solo = s1.elo1v1;
              const e2solo = s2.elo1v1;
              const { d1, d2 } = updateEloPair(e1, e2, team1Won ? 1 : 0, k);
              const { d1: d1solo, d2: d2solo } = updateEloPair(e1solo, e2solo, team1Won ? 1 : 0, k);
              s1.elo1v1 = e1solo + d1solo;
              s2.elo1v1 = e2solo + d2solo;
              bumpMapSimple(s1.mapStats, mapName, team1Won);
              bumpMapSimple(s2.mapStats, mapName, !team1Won);
              const roppFor1 = oppRaceZtp(sl.teamB[0], rosterMap, n2);
              const roppFor2 = oppRaceZtp(sl.teamA[0], rosterMap, n1);
              bumpVsOppRace(s1.vsOppRace, roppFor1, team1Won);
              bumpVsOppRace(s2.vsOppRace, roppFor2, !team1Won);
              record(n1, e1, d1, team1Won, [n2], [roppFor1 || '']);
              record(n2, e2, d2, !team1Won, [n1], [roppFor2 || '']);
            } else if ((format === '2v2' || format === '3v3') && namesA.length && namesB.length) {
              const snapA = namesA.map((nm) => ({ nm, eloBefore: ensure(nm).elo, eloTeamBefore: ensure(nm).eloTeam }));
              const snapB = namesB.map((nm) => ({ nm, eloBefore: ensure(nm).elo, eloTeamBefore: ensure(nm).eloTeam }));
              const racesB = opponentRacesFromSlotRows(sl.teamB, namesB, rosterMap);
              const racesA = opponentRacesFromSlotRows(sl.teamA, namesA, rosterMap);
              const aAvg = snapA.reduce((s, x) => s + x.eloBefore, 0) / snapA.length;
              const bAvg = snapB.reduce((s, x) => s + x.eloBefore, 0) / snapB.length;
              const aTeamAvg = snapA.reduce((s, x) => s + x.eloTeamBefore, 0) / snapA.length;
              const bTeamAvg = snapB.reduce((s, x) => s + x.eloTeamBefore, 0) / snapB.length;
              const { d1, d2 } = updateEloPair(aAvg, bAvg, team1Won ? 1 : 0, k);
              const { d1: d1team, d2: d2team } = updateEloPair(aTeamAvg, bTeamAvg, team1Won ? 1 : 0, k);
              for (const { nm, eloBefore, eloTeamBefore } of snapA) {
                record(nm, eloBefore, d1, team1Won, namesB, racesB);
                ensure(nm).eloTeam = eloTeamBefore + d1team;
                bumpTeamMap(ensure(nm).teamMapStats, format, mapName, team1Won);
              }
              for (const { nm, eloBefore, eloTeamBefore } of snapB) {
                record(nm, eloBefore, d2, !team1Won, namesA, racesA);
                ensure(nm).eloTeam = eloTeamBefore + d2team;
                bumpTeamMap(ensure(nm).teamMapStats, format, mapName, !team1Won);
              }
            }
          }
        }
      }

      return { statsByName, stateByName };
    }

    function sortTableByColumn(table, columnIndex, asc, isNumeric) {
      const dirModifier = asc ? 1 : -1;
      const tBody = table.tBodies[0];
      const rows = Array.from(tBody.querySelectorAll('tr'));
      const sortedRows = rows.sort((a, b) => {
        const aTd = a.querySelector(`td:nth-child(${columnIndex + 1})`);
        const bTd = b.querySelector(`td:nth-child(${columnIndex + 1})`);
        let aColText = aTd ? aTd.textContent.trim() : '';
        let bColText = bTd ? bTd.textContent.trim() : '';
        if (isNumeric) {
          const parseNum = (t) => {
            const m = t.match(/-?\d+/);
            return m ? parseInt(m[0], 10) : 0;
          };
          return (parseNum(aColText) - parseNum(bColText)) * dirModifier;
        }
        return aColText.localeCompare(bColText, 'ko') * dirModifier;
      });
      while (tBody.firstChild) tBody.removeChild(tBody.firstChild);
      tBody.append(...sortedRows);
    }

    function buildEloRoundSeries(history) {
      const sorted = [...(history || [])].sort((a, b) => a.seq - b.seq);
      const eloByRound = new Map();
      for (const h of sorted) {
        if (h.round == null) continue;
        eloByRound.set(h.round, h.eloAfter);
      }
      const rounds = [...eloByRound.keys()].sort((a, b) => a - b);
      const points = [{ round: null, elo: 1000 }];
      for (const r of rounds) points.push({ round: r, elo: eloByRound.get(r) });
      return points;
    }

    function mountEloLineChart(canvasId, history) {
      const canvas = document.getElementById(canvasId);
      if (!canvas || typeof Chart === 'undefined') return null;
      const points = buildEloRoundSeries(history);
      const labels = points.map((p) => (p.round == null ? '시작' : `${p.round}R`));
      const data = points.map((p) => p.elo);
      return new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'ELO',
              data,
              borderColor: '#4f46e5',
              backgroundColor: 'rgba(79, 70, 229, 0.06)',
              fill: true,
              tension: 0.25,
              pointRadius: points.length <= 12 ? 3 : 2,
              pointHoverRadius: 5,
              borderWidth: 2,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: false,
              grid: { color: 'rgba(148,163,184,0.2)' },
              ticks: { font: { size: 11 } },
            },
            x: {
              title: { display: true, text: '라운드', font: { size: 10 } },
              ticks: { maxTicksLimit: 14, font: { size: 9 } },
              grid: { display: false },
            },
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: (items) => {
                  const idx = items[0].dataIndex;
                  const pt = points[idx];
                  if (!pt || pt.round == null) return '시작 · 1000';
                  return `${pt.round}R 종료`;
                },
                label: (item) => {
                  const idx = item.dataIndex;
                  const pt = points[idx];
                  const prev = idx > 0 ? points[idx - 1].elo : null;
                  const delta = prev != null ? pt.elo - prev : 0;
                  const deltaStr = delta > 0 ? ` (+${delta})` : delta < 0 ? ` (${delta})` : '';
                  return `ELO ${item.raw}${deltaStr}`;
                },
              },
            },
          },
        },
      });
    }

    function assignEloRankMap(rows, eloKey) {
      const sorted = [...rows].sort((a, b) => {
        if (b[eloKey] !== a[eloKey]) return b[eloKey] - a[eloKey];
        return a.dn.localeCompare(b.dn, 'ko');
      });
      const map = {};
      let i = 0;
      while (i < sorted.length) {
        const rank = i + 1;
        let j = i + 1;
        while (j < sorted.length && sorted[j][eloKey] === sorted[i][eloKey]) j++;
        for (let k = i; k < j; k++) map[sorted[k].dn] = rank;
        i = j;
      }
      return map;
    }

    function computeEloRankMaps(roster, stateByName, statsByName) {
      const rows = (roster || [])
        .filter((p) => p.teamId)
        .map((p) => {
          const dn = (p.displayName || '').trim();
          const st = stateByName.get(dn);
          const stats = statsByName[dn] || emptyStats();
          return {
            dn,
            elo: st?.elo ?? 1000,
            elo1v1: st?.elo1v1 ?? 1000,
            eloTeam: st?.eloTeam ?? 1000,
            soloG: (stats.개인전?.w || 0) + (stats.개인전?.l || 0),
            teamG: (stats.팀전?.w || 0) + (stats.팀전?.l || 0),
            totalG: (stats.total?.w || 0) + (stats.total?.l || 0),
          };
        });
      const withGames = rows.filter((r) => r.totalG > 0);
      const soloRows = rows.filter((r) => r.soloG > 0);
      const teamRows = rows.filter((r) => r.teamG > 0);
      return {
        total: assignEloRankMap(withGames.length ? withGames : rows, 'elo'),
        solo: assignEloRankMap(soloRows, 'elo1v1'),
        team: assignEloRankMap(teamRows, 'eloTeam'),
      };
    }

    function formatPlayerEloDetailHtml(pst, ranks, stats) {
      const total = pst?.elo ?? 1000;
      const solo = pst?.elo1v1 ?? 1000;
      const team = pst?.eloTeam ?? 1000;
      const soloG = (stats?.개인전?.w || 0) + (stats?.개인전?.l || 0);
      const teamG = (stats?.팀전?.w || 0) + (stats?.팀전?.l || 0);
      const totalG = (stats?.total?.w || 0) + (stats?.total?.l || 0);

      function ring(label, score, rank, hasGames, tone) {
        const rankHtml =
          hasGames && rank != null
            ? `<span class="player-elo-ring__rank">${rank}위</span>`
            : '<span class="player-elo-ring__rank player-elo-ring__rank--na">—</span>';
        const toneClass = tone === 'primary' ? ' player-elo-ring--primary' : '';
        return `<div class="player-elo-ring${toneClass}">
          <div class="player-elo-ring__circle"><span class="player-elo-ring__score">${score}</span></div>
          ${rankHtml}
          <span class="player-elo-ring__label">${escapeHtml(label)}</span>
        </div>`;
      }

      return `<div class="player-elo-rings">
        ${ring('종합', total, ranks?.total, totalG > 0, 'primary')}
        ${ring('개인전', solo, ranks?.solo, soloG > 0)}
        ${ring('팀전', team, ranks?.team, teamG > 0)}
      </div>`;
    }

    function buildPlayerDetailInnerHTML(meta, p, chartCanvasId) {
      const dn = (p.displayName || '').trim();
      const st = lastStatsByName[dn] || emptyStats();
      const pst = lastStateByName.get(dn);
      const rankMaps = computeEloRankMaps(lastPlayers, lastStateByName, lastStatsByName);
      const ranks = {
        total: rankMaps.total[dn],
        solo: rankMaps.solo[dn],
        team: rankMaps.team[dn],
      };
      const history = [...(pst?.history || [])].sort((a, b) => a.seq - b.seq);
      const race = getRaceLetter(p);

      const histRows = [...history].reverse().slice(0, 50).map((h) => {
        const res = h.won ? '승' : '패';
        const resCls = h.won ? 'text-emerald-600 font-semibold' : 'text-rose-600 font-semibold';
        const dCls = h.delta > 0 ? 'elo-up' : h.delta < 0 ? 'elo-down' : 'text-zinc-500';
        const oppHtml = formatOpponentsWithRaces(h.opponents || [], h.opponentRaces || []);
        const tip = `${h.fixtureId || ''} · 슬롯${h.slot}`.trim();
        return `<tr class="border-b border-zinc-50 hover:bg-zinc-50/80">
          <td class="px-2 py-2 whitespace-nowrap text-zinc-600">${h.round}R</td>
          <td class="px-2 py-2">${h.slot}</td>
          <td class="px-2 py-2">${formatChip(h.format)}</td>
          <td class="px-2 py-2 text-zinc-700">${escapeHtml(h.map)}</td>
          <td class="px-2 py-2 text-xs text-zinc-700 max-w-[11rem] sm:max-w-[14rem] leading-snug" title="${escapeHtml(tip)}">${oppHtml}</td>
          <td class="px-2 py-2 ${resCls}">${res}</td>
          <td class="px-2 py-2 tabular-nums font-mono text-xs ${dCls}">${h.delta > 0 ? '+' : ''}${h.delta}</td>
          <td class="px-2 py-2 tabular-nums text-zinc-600">${h.eloAfter}</td>
        </tr>`;
      }).join('');

      return `
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="rounded-xl border border-zinc-200 bg-gradient-to-br from-zinc-50 to-white p-4 shadow-sm">
            <h4 class="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-3">프로필</h4>
            <p class="text-sm"><span class="text-zinc-500">팀</span> <span class="font-semibold text-zinc-900">${escapeHtml(teamName(meta, p.teamId))}</span></p>
            <p class="text-sm mt-1"><span class="text-zinc-500">종족</span> ${getRaceIcon(race)}<span class="font-medium">${escapeHtml(race || '—')}</span></p>
            <p class="text-sm mt-1"><span class="text-zinc-500">티어</span> <span class="font-medium">${escapeHtml(p.tier || '—')}</span></p>
            ${renderRaceVsOpponentBlock(p)}
            ${formatPlayerEloDetailHtml(pst, ranks, st)}
          </div>
          <div class="rounded-xl border border-zinc-200 bg-white p-4 shadow-sm">
            <h4 class="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-3">세트 요약</h4>
            <p class="text-sm"><span class="text-zinc-500">전체</span> <strong>${wlCell(st.total)}</strong>
              <span class="text-zinc-400">(${st.total.w + st.total.l > 0 ? ((st.total.w / (st.total.w + st.total.l)) * 100).toFixed(1) : '0'}%)</span></p>
            <p class="text-sm mt-1"><span class="text-zinc-500">개인전</span> <strong>${wlCell(st.개인전)}</strong></p>
            <p class="text-sm mt-1"><span class="text-zinc-500">팀전</span> <strong>${wlCell(st.팀전)}</strong></p>
            <p class="text-sm mt-1"><span class="text-zinc-500">2:2 / 3:3</span> <strong>${wlCell(st['22'])}</strong> · <strong>${wlCell(st['33'])}</strong></p>
          </div>
        </div>

        <div class="mt-6 rounded-xl border border-zinc-200 bg-white p-4 shadow-sm overflow-hidden">
          <h4 class="text-sm font-bold text-zinc-800 mb-3">세트 기록</h4>
          <div class="overflow-x-auto max-h-96 overflow-y-auto text-xs">
            <table class="min-w-full text-left">
              <thead class="sticky top-0 bg-zinc-50 text-zinc-500 font-semibold z-10">
                <tr>
                  <th class="px-2 py-2">R</th>
                  <th class="px-2 py-2">#</th>
                  <th class="px-2 py-2">유형</th>
                  <th class="px-2 py-2">맵</th>
                  <th class="px-2 py-2">상대</th>
                  <th class="px-2 py-2">결</th>
                  <th class="px-2 py-2">Δ</th>
                  <th class="px-2 py-2">ELO</th>
                </tr>
              </thead>
              <tbody>${histRows || '<tr><td colspan="8" class="p-4 text-zinc-400">기록 없음</td></tr>'}</tbody>
            </table>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="rounded-xl border border-zinc-200 bg-white p-4 shadow-sm">
            <h4 class="text-sm font-bold text-zinc-800 mb-3">맵별 개인전</h4>
            ${renderMapSection(pst?.mapStats)}
          </div>
          ${renderVsOppRaceSection(pst?.vsOppRace)}
        </div>

        <div class="mt-4">${renderTeamMapSection(pst?.teamMapStats)}</div>

        <div class="mt-6 rounded-xl border border-zinc-200 bg-white p-4 shadow-sm">
          <h4 class="text-sm font-bold text-zinc-800 mb-2">ELO 변화 <span class="text-xs font-normal text-zinc-400">(라운드 종료 시점)</span></h4>
          <div class="h-36 sm:h-40"><canvas id="${escapeHtml(chartCanvasId)}"></canvas></div>
        </div>`;
    }

    function renderVsOppRaceSection(vs) {
      if (!vs) return '<div class="rounded-xl border border-zinc-200 bg-white p-4 shadow-sm"><p class="text-sm text-zinc-500">상대 종족 데이터 없음</p></div>';
      let rows = '';
      for (const key of ['Z', 'T', 'P']) {
        const o = vs[key] || { w: 0, l: 0 };
        const n = o.w + o.l;
        const pct = n ? ((o.w / n) * 100).toFixed(1) : '—';
        const cls = !n ? 'text-zinc-400' : Number(pct) > 50 ? 'text-emerald-600 font-semibold' : Number(pct) < 50 ? 'text-rose-600' : '';
        rows += `<tr class="border-b border-zinc-50">
          <td class="py-2">${getRaceIcon(key)}${key}</td>
          <td class="py-2 text-right tabular-nums">${o.w}</td>
          <td class="py-2 text-right tabular-nums">${o.l}</td>
          <td class="py-2 text-right tabular-nums ${cls}">${pct === '—' ? '—' : pct + '%'}</td>
        </tr>`;
      }
      return `<div class="rounded-xl border border-zinc-200 bg-white p-4 shadow-sm">
        <h4 class="text-sm font-bold text-zinc-800 mb-2">개인전 · 상대 종족별</h4>
        <p class="text-xs text-zinc-500 mb-3">슬롯에 적힌 상대 race가 있으면 우선, 없으면 선수 명단의 등록 종족을 사용합니다. Z / T / P만 집계합니다.</p>
        <table class="w-full text-sm"><thead><tr class="text-left text-zinc-500 border-b border-zinc-200">
          <th class="py-2">상대</th><th class="py-2 text-right">승</th><th class="py-2 text-right">패</th><th class="py-2 text-right">승률</th>
        </tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function renderTeamMapBucket(label, mapObj) {
      const maps = Object.keys(mapObj || {}).sort();
      if (!maps.length) {
        return `<div class="rounded-lg border border-dashed border-zinc-200 p-3 text-xs text-zinc-500">${escapeHtml(label)} 맵별 기록 없음</div>`;
      }
      let body = '';
      for (const map of maps) {
        const o = mapObj[map];
        const n = o.w + o.l;
        const pct = n ? ((o.w / n) * 100).toFixed(1) : '—';
        const cls = !n ? 'text-zinc-400' : Number(pct) > 50 ? 'text-emerald-600 font-semibold' : Number(pct) < 50 ? 'text-rose-600' : '';
        body += `<tr class="border-b border-zinc-50">
          <td class="py-1.5 font-medium text-zinc-800">${escapeHtml(map)}</td>
          <td class="py-1.5 text-right tabular-nums">${o.w}</td>
          <td class="py-1.5 text-right tabular-nums">${o.l}</td>
          <td class="py-1.5 text-right tabular-nums ${cls}">${pct === '—' ? '—' : pct + '%'}</td>
        </tr>`;
      }
      return `<div class="rounded-lg border border-zinc-200 bg-zinc-50/60 p-3">
        <h5 class="text-xs font-bold text-zinc-600 uppercase tracking-wide mb-2">${escapeHtml(label)}</h5>
        <table class="w-full text-xs"><thead><tr class="text-zinc-500">
          <th class="text-left py-1">맵</th><th class="text-right py-1">승</th><th class="text-right py-1">패</th><th class="text-right py-1">승률</th>
        </tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function renderTeamMapSection(tms) {
      const tm = tms || { '2v2': {}, '3v3': {} };
      return `<div class="rounded-xl border border-zinc-200 bg-white p-4 shadow-sm">
        <h4 class="text-sm font-bold text-zinc-800 mb-3">팀플 · 맵별 (2:2 / 3:3)</h4>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          ${renderTeamMapBucket('2v2', tm['2v2'])}
          ${renderTeamMapBucket('3v3', tm['3v3'])}
        </div>
      </div>`;
    }

    function setHeroDetailMode(detail) {
      const h = document.getElementById('s11-page-header');
      const m = document.getElementById('main-stack');
      if (h) h.classList.toggle('hidden', !!detail);
      if (m) m.classList.toggle('mt-4', !!detail);
    }

    function findPlayerById(playerId) {
      return (lastPlayers || []).find((x) => String(x.id || '') === String(playerId || ''));
    }

    function showPlayerListPage() {
      mobilePlayerDetailViaList = false;
      destroyDetailChart();
      setHeroDetailMode(false);
      renderPlayersPage(lastMeta, lastPlayers, lastStatsByName, lastStateByName);
      attachPlayerFilterListeners();
      if (typeof applyPlayerFilters === 'function') applyPlayerFilters();
    }

    function showPlayerDetailFullPage(playerId) {
      const p = findPlayerById(playerId);
      if (!p || !lastMeta) return;
      destroyDetailChart();
      if (modalEloChart) {
        modalEloChart.destroy();
        modalEloChart = null;
      }
      setHeroDetailMode(true);
      const dn = (p.displayName || '').trim();
      const pst = lastStateByName.get(dn);
      const eloHistory = [...(pst?.history || [])].sort((a, b) => a.seq - b.seq);
      const chartId = 'eloDetailChart';
      const inner = buildPlayerDetailInnerHTML(lastMeta, p, chartId);
      document.getElementById('players-root').innerHTML = `
        <div class="rounded-xl border border-zinc-200 bg-white shadow-sm overflow-hidden">
          <div class="flex flex-wrap items-center gap-3 border-b border-zinc-200 bg-zinc-50 px-4 py-3">
            <button type="button" id="detail-back-btn" class="inline-flex items-center gap-1 rounded-full bg-white border border-zinc-200 px-3 py-1.5 text-sm font-semibold text-zinc-700 hover:bg-zinc-100">
              ← 선수 목록
            </button>
            <div class="min-w-0 flex-1">
              <h2 class="text-lg font-bold text-zinc-900 truncate">${escapeHtml(p.displayName)} <span class="text-zinc-400 font-mono text-sm">${escapeHtml(p.id || '')}</span></h2>
              <p class="text-[11px] text-zinc-500">이 화면 URL을 저장하면 북마크로 다시 열 수 있습니다.</p>
            </div>
          </div>
          <div class="p-4 sm:p-6 bg-white">${inner}</div>
        </div>`;
      document.getElementById('detail-back-btn').addEventListener('click', () => {
        if (mobilePlayerDetailViaList) {
          window.history.back();
        } else {
          window.history.replaceState({}, '', location.pathname);
          showPlayerListPage();
        }
      });
      detailPageChart = mountEloLineChart(chartId, eloHistory);
    }

    function isMobilePlayerDetail() {
      return window.matchMedia('(max-width: 767px)').matches;
    }

    function routeFromUrl() {
      const q = new URLSearchParams(location.search).get('player');
      if (q) {
        if (findPlayerById(q)) showPlayerDetailFullPage(q);
        else {
          window.history.replaceState({}, '', location.pathname);
          showPlayerListPage();
        }
      } else {
        showPlayerListPage();
      }
    }

    function renderMapSection(mapStats) {
      const maps = Object.keys(mapStats || {}).sort();
      if (!maps.length) {
        return '<p class="text-sm text-zinc-500">개인전 세트가 입력되면 맵별 승패가 표시됩니다.</p>';
      }
      let html = '<table class="w-full text-sm"><thead><tr class="text-left text-zinc-500 border-b border-zinc-200">';
      html += '<th class="py-2 pr-2">맵</th><th class="py-2 text-right">승</th><th class="py-2 text-right">패</th><th class="py-2 text-right">승률</th></tr></thead><tbody>';
      for (const map of maps) {
        const o = mapStats[map];
        const w = o.w;
        const l = o.l;
        const pct = w + l > 0 ? ((w / (w + l)) * 100).toFixed(1) : '—';
        const cls = w + l === 0 ? 'text-zinc-400' : Number(pct) > 50 ? 'text-emerald-600 font-semibold' : Number(pct) < 50 ? 'text-rose-600' : '';
        html += `<tr class="border-b border-zinc-50">
          <td class="py-2 font-medium text-zinc-800">${escapeHtml(map)}</td>
          <td class="py-2 text-right tabular-nums">${w}</td>
          <td class="py-2 text-right tabular-nums">${l}</td>
          <td class="py-2 text-right tabular-nums ${cls}">${pct === '—' ? '—' : pct + '%'}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      return html;
    }

    function openPlayerModal(playerId) {
      const p = findPlayerById(playerId);
      if (!p || !lastMeta) return;
      destroyDetailChart();
      const dn = (p.displayName || '').trim();
      const pst = lastStateByName.get(dn);
      const eloHistory = [...(pst?.history || [])].sort((a, b) => a.seq - b.seq);
      const chartId = 'eloHistoryChart';
      document.getElementById('modalPlayerName').textContent = `${p.displayName} (${p.id || '—'})`;
      document.getElementById('playerModalContent').innerHTML = buildPlayerDetailInnerHTML(lastMeta, p, chartId);
      document.getElementById('playerModal').classList.remove('hidden');
      if (modalEloChart) {
        modalEloChart.destroy();
        modalEloChart = null;
      }
      modalEloChart = mountEloLineChart(chartId, eloHistory);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const [meta, playersData, fixtures] = await Promise.all([
          loadJson('data/s11/meta.json'),
          loadJson('data/s11/players.json'),
          loadJson('data/s11/fixtures.json'),
        ]);
        const roundDocs = await loadAllRoundResults(10, fixtures);
        const players = playersData.players || [];
        const { statsByName, stateByName } = simulateSeason(fixtures, roundDocs, players);

        lastMeta = meta;
        lastPlayers = players;
        lastStatsByName = statsByName;
        lastStateByName = stateByName;

        routeFromUrl();
        window.addEventListener('popstate', () => routeFromUrl());

        document.body.addEventListener('click', (e) => {
          const headerCell = e.target.closest('.table-sortable th[data-sort], .table-sortable th[data-sort-numeric]');
          if (headerCell && !e.target.closest('input, select')) {
            const tableElement = headerCell.closest('table');
            const headerIndex = Array.prototype.indexOf.call(headerCell.parentElement.children, headerCell);
            const currentIsAsc = headerCell.classList.contains('sorted-asc');
            tableElement.querySelectorAll('th[data-sort], th[data-sort-numeric]').forEach((th) => th.classList.remove('sorted-asc', 'sorted-desc'));
            headerCell.classList.toggle('sorted-asc', !currentIsAsc);
            headerCell.classList.toggle('sorted-desc', currentIsAsc);
            sortTableByColumn(tableElement, headerIndex, !currentIsAsc, headerCell.hasAttribute('data-sort-numeric'));
          }
          const plink = e.target.closest('.player-link');
          if (plink) {
            e.preventDefault();
            const id = plink.dataset.playerId;
            if (!id) return;
            if (isMobilePlayerDetail()) {
              mobilePlayerDetailViaList = true;
              window.history.pushState({ view: 'player', id }, '', `?player=${encodeURIComponent(id)}`);
              showPlayerDetailFullPage(id);
              window.scrollTo(0, 0);
            } else {
              openPlayerModal(id);
            }
          }
        });

        document.getElementById('playerModalClose').addEventListener('click', () => {
          document.getElementById('playerModal').classList.add('hidden');
          if (modalEloChart) {
            modalEloChart.destroy();
            modalEloChart = null;
          }
        });
        const modalShell = document.querySelector('#playerModal > div');
        if (modalShell) {
          modalShell.addEventListener('click', (e) => {
            if (e.target === modalShell) document.getElementById('playerModalClose').click();
          });
        }
      } catch (err) {
        console.error(err);
        document.getElementById('loading').innerHTML = `<p class="text-red-600 px-4">로딩 실패: ${escapeHtml(err.message)}</p>`;
        return;
      }
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
    });
  </script>
</body>
</html>
