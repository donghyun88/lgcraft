<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMAL LEAGUE SEASON 11 - 8강 대진표</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #e94560; margin-bottom: 10px; }
        .league-info { margin-bottom: 30px; font-size: 1.1rem; color: #a2a2a2; }
        
        .tournament-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 1200px;
        }

        .side {
            display: flex;
            flex-direction: column;
            gap: 100px;
        }

        .match {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            width: 220px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .player {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }

        .player:last-child { border-bottom: none; }
        
        .name { font-weight: bold; }
        .race { font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; }
        .race.Z { background-color: #800080; color: white; } /* Zerg */
        .race.T { background-color: #0000FF; color: white; } /* Terran */
        .race.P { background-color: #FFD700; color: black; } /* Protoss */

        .center-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        .final-box {
            background: linear-gradient(135deg, #e94560 0%, #a21b31 100%);
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
        }

        .semi-final {
            background: #0f3460;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
        }

        .connector-line {
            color: #4e4e4e;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <h1>ANIMAL LEAGUE SEASON 11</h1>
    <div class="league-info">LG CRAFT - 8강 토너먼트</div>

    <div class="tournament-container">
        <div class="side">
            <div class="match">
                <div class="player"><span class="name">황찬종</span><span class="race Z">Z</span></div>
                <div class="player"><span class="name">황진영</span><span class="race Z">Z</span></div>
            </div>
            <div class="match">
                <div class="player"><span class="name">공동현</span><span class="race Z">Z</span></div>
                <div class="player"><span class="name">임호진</span><span class="race T">T</span></div>
            </div>
        </div>

        <div class="connector-line">▶</div>

        <div class="center-block">
            <div class="semi-final">4강 Match 1 (A vs B)</div>
            <div class="final-box">🏆 CHAMPION 🏆</div>
            <div class="semi-final">4강 Match 2 (C vs D)</div>
        </div>

        <div class="connector-line">◀</div>

        <div class="side">
            <div class="match">
                <div class="player"><span class="name">권혁준</span><span class="race Z">Z</span></div>
                <div class="player"><span class="name">박정진</span><span class="race P">P</span></div>
            </div>
            <div class="match">
                <div class="player"><span class="name">강구산</span><span class="race Z">Z</span></div>
                <div class="player"><span class="name">김태준</span><span class="race P">P</span></div>
            </div>
        </div>
    </div>

</body>
</html>
