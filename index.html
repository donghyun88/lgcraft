  <style>

    .form-l { color: #fff; background: linear-gradient(145deg, #dc2626, #b91c1c); }

      overflow: hidden;
      border-radius: 9999px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #fafafa 0%, #f4f4f5 100%);
      box-shadow: 0 0 0 1px rgba(228, 228, 231, 0.95), 0 1px 3px rgba(0, 0, 0, 0.06);
    }
    .standings-logo-img {
      display: block;
      width: 100%;

      height: 3rem;

      }
    }
    .standings-logo-frame--next {

      height: 2.875rem;
    }
    @media (min-width: 640px) {

        width: 3rem;
        height: 3rem;
      }
    }
    .standings-logo-frame--schedule {
      width: 3rem;
      height: 3rem;
    }
    @media (min-width: 640px) {
      .standings-logo-frame--schedule {
        width: 3.375rem;
        height: 3.375rem;
      }
    }
    .schedule-matchup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
    }
    @media (min-width: 640px) {
      .schedule-matchup {
        gap: 0.75rem;
      }
    }
    .schedule-matchup-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      min-width: 0;
      flex: 1 1 0;
    }
    .schedule-matchup-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.2rem 0.25rem;
      font-size: 11px;
      line-height: 1.35;
      color: #18181b;
    }
    @media (min-width: 640px) {

    }
    .schedule-matchup-vs {
      flex-shrink: 0;
      font-size: 11px;

      padding: 0 0.1rem;
    }
    /* 경기 일정: 카드형(세트맵 1 + 대전별) */
    .schedule-chunk h3 {
      letter-spacing: -0.02em;
      text-align: center;

    .schedule-round-shell {
      border-radius: 0.75rem;

    .schedule-round-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.5rem;

    @media (min-width: 1024px) {
      .schedule-round-body {
        grid-template-columns: minmax(10.5rem, 0.52fr) minmax(0, 1.48fr);
        gap: 0.75rem;

    }
    .schedule-round-matches {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.5rem;
    }
    @media (min-width: 768px) {
      .schedule-round-matches {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (min-width: 1280px) {

    .schedule-card--maps .schedule-slot-line {

    .schedule-card--maps .schedule-slot-line:last-child {

  <script>
    const PLAYOFF_SPOTS = 4;
    /** fixtures `matchups[].date` 가 "M/D" 일 때 사용하는 연도(요일 계산) */
    const SCHEDULE_DATE_YEAR = 2026;
    const SCHEDULE_WEEKDAY_KO = ['일', '월', '화', '수', '목', '금', '토'];

    async function loadJson(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(path + ' ' + res.status);
      return res.json();
    }

    function teamName(meta, id) {
      const t = meta.teams.find((x) => x.id === id);
      return t ? t.name : id;
    }

    function isSeriesDecided(mu) {
      if (!mu) return false;
      const sw = mu.series && mu.series.winnerTeamIndex;
      return sw === 1 || sw === 2;
    }

    /** 해당 라운드 일정의 모든 대전이 시리즈 승패까지 확정됐는지 */
    function isRoundAllSeriesDecided(rd, doc) {
      if (!rd || !(rd.matchups || []).length) return false;
      if (!doc) return false;
      const byFixture = new Map((doc.matchups || []).map((mu) => [mu.fixtureId, mu]));
      for (const fm of rd.matchups) {
        if (!isSeriesDecided(byFixture.get(fm.id))) return false;
      }
      return true;
    }

    /** fixtures에 있는 1~through 라운드 각각: 일정이 있으면 결과 문서가 있고, 모든 대전 시리즈가 끝난 경우만 true */
    function allScheduledRoundsSeriesCompleteThrough(fixtures, roundDocs, throughRound) {
      if (throughRound < 1) return false;
      const byRound = new Map();
      for (const d of roundDocs || []) {
        if (d && d.round != null) byRound.set(d.round, d);
      }
      for (let rn = 1; rn <= throughRound; rn++) {
        const rd = (fixtures.rounds || []).find((x) => x.round === rn);
        if (!rd) return false;
        if (!isRoundAllSeriesDecided(rd, byRound.get(rn))) return false;
      }
      return true;
    }

    /** 시리즈 승 상대 전적 누적: wins[winnerId][loserId] = 횟수 */
    function recordSeriesWinH2h(wins, winnerId, loserId) {
      if (!winnerId || !loserId) return;
      if (!wins[winnerId]) wins[winnerId] = {};
      wins[winnerId][loserId] = (wins[winnerId][loserId] || 0) + 1;
    }

    /**
     * 라운드 번호가 beforeRound 미만인 대전만 집계(해당 라 카드에 쓸 ‘직전까지’ 상대 전적).
     * @returns {Record<string, Record<string, number>>}
     */
    function buildSeriesHeadToHeadBeforeRound(fixtures, roundDocs, beforeRound) {
      const wins = {};
      const byRound = new Map();
      for (const d of roundDocs || []) {
        if (d && d.round != null) byRound.set(d.round, d);
      }
      const rounds = [...(fixtures.rounds || [])].sort((a, b) => (a.round || 0) - (b.round || 0));
      for (const rd of rounds) {
        if (rd.round >= beforeRound) break;
        const doc = byRound.get(rd.round);
        if (!doc) continue;
        const byFixture = new Map((doc.matchups || []).map((mu) => [mu.fixtureId, mu]));
        for (const fm of rd.matchups || []) {
          const mu = byFixture.get(fm.id);
          if (!isSeriesDecided(mu)) continue;
          const [tA, tB] = fm.teamIds || [];
          if (!tA || !tB) continue;
          const sw = mu.series && mu.series.winnerTeamIndex;
          if (sw === 1) recordSeriesWinH2h(wins, tA, tB);
          else if (sw === 2) recordSeriesWinH2h(wins, tB, tA);
        }
      }
      return wins;
    }

    /** 카드에 적힌 팀 순서 기준 시즌 대전 승–승. 없으면 빈 문자열 */
    function formatScheduleHeadToHeadHtml(meta, tidFront, tidBack, wins) {
      if (!tidFront || !tidBack || !wins) return '';
      const wf = wins[tidFront] && wins[tidFront][tidBack] != null ? wins[tidFront][tidBack] : 0;
      const wb = wins[tidBack] && wins[tidBack][tidFront] != null ? wins[tidBack][tidFront] : 0;
      if (wf + wb === 0) return '';
      const nameF = teamName(meta, tidFront);
      const nameB = teamName(meta, tidBack);
      const tip = escapeHtml(`${nameF} ${wf}승 · ${nameB} ${wb}승 (시즌 대전, 직전 라까지)`);
      return `<div class="mt-1.5 text-[10px] leading-snug text-zinc-500" title="${tip}">시즌 상대 <span class="tabular-nums font-semibold text-zinc-600">${wf}</span>–<span class="tabular-nums font-semibold text-zinc-600">${wb}</span></div>`;
    }

    function computeNextOpponents(meta, fixtures, roundDocs) {
      const byRound = new Map();
      for (const d of roundDocs || []) {
        if (d && d.round != null) byRound.set(d.round, d);
      }
      const rounds = [...(fixtures.rounds || [])].sort((a, b) => (a.round || 0) - (b.round || 0));
      const out = {};
      for (const tm of meta.teams) {
        let hit = null;
        for (const rd of rounds) {
          const doc = byRound.get(rd.round);
          const byFixture = doc ? new Map((doc.matchups || []).map((m) => [m.fixtureId, m])) : new Map();
          for (const fm of rd.matchups || []) {
            const [x, y] = fm.teamIds || [];
            if (x !== tm.id && y !== tm.id) continue;
            const mu = byFixture.get(fm.id);
            if (isSeriesDecided(mu)) continue;
            const oppId = x === tm.id ? y : x;
            const oppMeta = meta.teams.find((t) => t.id === oppId);
            hit = {
              opponentId: oppId,
              round: rd.round,
              fixtureId: fm.id,
              name: teamName(meta, oppId),
              short: (oppMeta && oppMeta.short) || teamName(meta, oppId),
            };
            break;
          }
          if (hit) break;
        }
        out[tm.id] = hit;
      }
      return out;
    }

    /** 한 라운드 문서: round-NN.json 또는 round-NN.sample.json */
    async function loadRoundResultDoc(roundNum) {
      const p = String(roundNum).padStart(2, '0');
      const urls = [
        `data/s11/results/round-${p}.json`,
        `data/s11/results/round-${p}.sample.json`,
      ];
      for (const url of urls) {
        const res = await fetch(url, { cache: 'no-store' });
        if (res.ok) return res.json();
      }
      return null;
    }

    async function fetchPerMatchResultDoc(fixtureId) {
      const url = `data/s11/results/${fixtureId}.json`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) return null;
      return res.json();
    }

    function matchupFromPerMatchDoc(doc, fixtureId) {
      if (!doc || !Array.isArray(doc.matchups)) return null;
      return doc.matchups.find((x) => x.fixtureId === fixtureId) || null;
    }

    async function mergePerMatchOverlaysIntoRoundDoc(baseDoc, roundNum, fixtures) {
      const rd = (fixtures.rounds || []).find((x) => x.round === roundNum);
      const fixtureIds = (rd && rd.matchups ? rd.matchups.map((m) => m.id).filter(Boolean) : []) || [];
      const overlays = new Map();
      await Promise.all(
        fixtureIds.map(async (fid) => {
          const pm = await fetchPerMatchResultDoc(fid);
          const mu = matchupFromPerMatchDoc(pm, fid);
          if (mu) overlays.set(fid, mu);
        }),
      );
      if (!overlays.size && !baseDoc) return null;

      const out = baseDoc
        ? JSON.parse(JSON.stringify(baseDoc))
        : {
            schemaVersion: 1,
            season: 11,
            phase: fixtures.phase || 'first_half',
            round: roundNum,
            recordedAt: '',
            author: '',
            notes: '',
            matchups: [],
          };
      if (!Array.isArray(out.matchups)) out.matchups = [];

      if (baseDoc) {
        for (const [fid, mu] of overlays) {
          const idx = out.matchups.findIndex((x) => x.fixtureId === fid);
          if (idx >= 0) out.matchups[idx] = mu;
          else out.matchups.push(mu);
        }
      } else {
        const ordered = [];
        for (const fid of fixtureIds) {
          const mu = overlays.get(fid);
          if (mu) ordered.push(mu);
        }
        out.matchups = ordered;
      }
      return out;
    }

    async function loadRoundResultDocMerged(roundNum, fixtures) {
      const base = await loadRoundResultDoc(roundNum);
      return mergePerMatchOverlaysIntoRoundDoc(base, roundNum, fixtures);
    }

    async function loadAllRoundResults(maxRound, fixtures) {
      const docs = [];
      for (let r = 1; r <= maxRound; r++) {
        const doc = await loadRoundResultDocMerged(r, fixtures);
        if (doc) docs.push(doc);
      }
      return docs;
    }

    function compareStandingRow(a, b) {
      if (b.seriesW !== a.seriesW) return b.seriesW - a.seriesW;
      if (b.setW !== a.setW) return b.setW - a.setW;
      if (a.seriesL !== b.seriesL) return a.seriesL - b.seriesL;
      return String(a.name || '').localeCompare(String(b.name || ''), 'ko');
    }

    /** 대전·세트 전적이 모두 같으면 동순위로 묶음 */
    function standingsRowTied(a, b) {
      return (
        a.seriesW === b.seriesW &&
        a.seriesL === b.seriesL &&
        a.setW === b.setW &&
        a.setL === b.setL
      );
    }

    /** 정렬된 행에 공동 순위 부여 (1,1,3 형태) */
    function assignStandingsRanks(rows) {
      const ranks = [];
      let i = 0;
      while (i < rows.length) {
        const rank = i + 1;
        let j = i + 1;
        while (j < rows.length && standingsRowTied(rows[i], rows[j])) j++;
        for (let k = i; k < j; k++) ranks[k] = rank;
        i = j;
      }
      return ranks;
    }

    function standingsRankMapFromRows(rows) {
      const ranks = assignStandingsRanks(rows);
      const map = {};
      rows.forEach((r, i) => {
        map[r.teamId] = ranks[i];
      });
      return map;
    }

    function ranksFromAcc(acc, meta) {
      const rows = meta.teams.map((tm) => {
        const s = acc[tm.id];
        return { teamId: tm.id, name: tm.name, seriesW: s.seriesW, seriesL: s.seriesL, setW: s.setW, setL: s.setL };
      }).sort(compareStandingRow);
      return standingsRankMapFromRows(rows);
    }

    function emptyTeamStandingAcc(teamId) {
      return { teamId, seriesW: 0, seriesL: 0, setW: 0, setL: 0, soloW: 0, soloL: 0, teamW: 0, teamL: 0 };
    }

    function slotPlanBySlot(fixtures, roundNum) {
      const rd = (fixtures.rounds || []).find((x) => x.round === roundNum);
      const m = new Map();
      if (!rd || !rd.slotPlan) return m;
      for (const s of rd.slotPlan) m.set(s.slot, s);
      return m;
    }

    function slotFormatFromPlan(metaSlot, sl) {
      if (metaSlot && metaSlot.format) return metaSlot.format;
      const n = Math.max((sl.teamA || []).length, (sl.teamB || []).length);
      if (n >= 3) return '3v3';
      if (n >= 2) return '2v2';
      return '1v1';
    }

    /** 한 라운드 결과 문서를 누적 표에 반영 (순위표·일정 순위 공통) */
    function applyRoundDocToAcc(acc, fixtures, doc, recent) {
      const rd = (fixtures.rounds || []).find((x) => x.round === doc.round);
      if (!rd) return;
      const planBySlot = slotPlanBySlot(fixtures, doc.round);
      const byFixture = new Map((doc.matchups || []).map((m) => [m.fixtureId, m]));
      for (const fm of rd.matchups || []) {
        const mu = byFixture.get(fm.id);
        if (!mu) continue;
        const [tA, tB] = fm.teamIds || [];
        if (!tA || !tB) continue;
        const sw = mu.series && mu.series.winnerTeamIndex;
        if (sw === 1) {
          acc[tA].seriesW++;
          acc[tB].seriesL++;
          if (recent) {
            recent[tA].push('W');
            recent[tB].push('L');
          }
        } else if (sw === 2) {
          acc[tB].seriesW++;
          acc[tA].seriesL++;
          if (recent) {
            recent[tB].push('W');
            recent[tA].push('L');
          }
        }
        for (const sl of mu.slots || []) {
          const w = sl.winnerTeamIndex;
          if (w !== 1 && w !== 2) continue;
          const format = slotFormatFromPlan(planBySlot.get(sl.slot), sl);
          const isSolo = format === '1v1';
          if (w === 1) {
            acc[tA].setW++;
            acc[tB].setL++;
            if (isSolo) {
              acc[tA].soloW++;
              acc[tB].soloL++;
            } else {
              acc[tA].teamW++;
              acc[tB].teamL++;
            }
          } else {
            acc[tB].setW++;
            acc[tA].setL++;
            if (isSolo) {
              acc[tB].soloW++;
              acc[tA].soloL++;
            } else {
              acc[tB].teamW++;
              acc[tA].teamL++;
            }
          }
        }
      }
    }

    /** throughRound 라운드까지 누적한 뒤 순위 맵 */
    function standingsAfterThroughRound(meta, fixtures, roundDocs, throughRound) {
      const acc = {};
      for (const t of meta.teams) acc[t.id] = emptyTeamStandingAcc(t.id);
      const docs = [...(roundDocs || [])].filter((d) => d && d.round != null).sort((a, b) => a.round - b.round);
      for (const doc of docs) {
        if (doc.round > throughRound) break;
        const rd = (fixtures.rounds || []).find((x) => x.round === doc.round);
        if (!rd) continue;
        applyRoundDocToAcc(acc, fixtures, doc, null);
      }
      const rows = meta.teams
        .map((tm) => {
          const s = acc[tm.id];
          return { teamId: tm.id, name: tm.name, seriesW: s.seriesW, seriesL: s.seriesL, setW: s.setW, setL: s.setL };
        })
        .sort(compareStandingRow);
      return { rankMap: standingsRankMapFromRows(rows) };
    }

    function buildStandingsAnalysis(meta, fixtures, roundDocs) {
      const acc = {};
      const recent = {};
      const rankHist = {};
      for (const t of meta.teams) {
        acc[t.id] = emptyTeamStandingAcc(t.id);
        recent[t.id] = [];
        rankHist[t.id] = [];
      }
      const pushRankSnapshot = () => {
        const rmap = ranksFromAcc(acc, meta);
        for (const t of meta.teams) rankHist[t.id].push(rmap[t.id]);
      };
      pushRankSnapshot();

      const docs = [...(roundDocs || [])].filter((d) => d && d.round != null).sort((a, b) => a.round - b.round);
      for (const doc of docs) {
        const rd = (fixtures.rounds || []).find((x) => x.round === doc.round);
        if (!rd) continue;
        applyRoundDocToAcc(acc, fixtures, doc, recent);
        pushRankSnapshot();
      }
      return { acc, recent, rankHist };
    }

    function formatSetDiffHtml(setW, setL) {
      const d = setW - setL;
      if (d > 0) return `<span class="text-emerald-700 font-semibold tabular-nums">+${d}</span>`;
      if (d < 0) return `<span class="text-rose-600 font-semibold tabular-nums">${d}</span>`;
      return '<span class="text-zinc-400 tabular-nums">0</span>';
    }

    function formatRecentSeriesHtml(seq) {
      const last = (seq || []).slice(-5);
      const pad = 5 - last.length;
      const bits = [];
      for (let i = 0; i < pad; i++) {
        bits.push('<span class="inline-flex w-4 h-4 rounded-sm form-empty text-[8px] font-bold items-center justify-center select-none" title="—">·</span>');
      }
      for (const c of last) {
        if (c === 'W') {
          bits.push(
            '<span class="inline-flex w-4 h-4 rounded-sm form-w text-[8px] font-extrabold items-center justify-center" title="대전 승">W</span>',
          );
        } else {
          bits.push(
            '<span class="inline-flex w-4 h-4 rounded-sm form-l text-[8px] font-extrabold items-center justify-center" title="대전 패">L</span>',
          );
        }
      }
      return `<div class="inline-flex flex-wrap gap-0.5 justify-center">${bits.join('')}</div>`;
    }

    function rankSparklineSvg(rankHistory, teamCount) {
      const hist = rankHistory || [];
      if (hist.length < 2) {
        return '<span class="text-zinc-300 text-[11px]">—</span>';
      }
      const w = 78;
      const h = 26;
      const pad = 3;
      const n = hist.length;
      const maxR = Math.max(2, teamCount);
      const coords = hist.map((rk, i) => {
        const x = n === 1 ? (w - 2 * pad) / 2 + pad : pad + (i * (w - 2 * pad)) / (n - 1);
        const r = Math.min(maxR, Math.max(1, Number(rk) || maxR));
        const y = pad + (r - 1) * ((h - 2 * pad) / (maxR - 1));
        return { x, y };
      });
      const points = coords.map((p) => `${p.x},${p.y}`).join(' ');
      const dots = coords.map((p) => `<circle class="spark-dot" cx="${p.x}" cy="${p.y}" r="2" />`).join('');
      return `<svg class="inline-block align-middle" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" role="img" aria-label="라운드별 순위 추이"><title>라운드별 순위 (1이 가장 위)</title><polyline class="spark-poly" points="${points}" />${dots}</svg>`;
    }

    function rankCellHtml(rank, hasAny) {
      if (!hasAny) return '<span class="text-zinc-300 tabular-nums text-[11px]">—</span>';
      if (rank === 1) {
        return '<span class="inline-flex items-center justify-center min-w-[1.35rem] h-5 px-0.5 rounded-full bg-gradient-to-br from-amber-300 to-amber-600 text-white text-[10px] font-black shadow-sm tabular-nums leading-none">1</span>';
      }
      if (rank === 2) {
        return '<span class="inline-flex items-center justify-center min-w-[1.35rem] h-5 px-0.5 rounded-full bg-gradient-to-br from-zinc-300 to-zinc-500 text-white text-[10px] font-black shadow-sm tabular-nums leading-none">2</span>';
      }
      if (rank === 3) {
        return '<span class="inline-flex items-center justify-center min-w-[1.35rem] h-5 px-0.5 rounded-full bg-gradient-to-br from-orange-300 to-orange-600 text-white text-[10px] font-black shadow-sm tabular-nums leading-none">3</span>';
      }
      return `<span class="text-zinc-700 font-semibold tabular-nums text-[11px]">${rank}</span>`;
    }

    /** lgcraft 루트의 s11_{팀번호}.{jpg|png} (5팀과 동일 규칙) */
    const TEAM_LOGO_SRC = {
      t1: 's11_1.jpg',
      t2: 's11_2.jpg',
      t3: 's11_3.png',
      t4: 's11_4.png',
      t5: 's11_5.png',
      t6: 's11_6.jpg',
    };

    function teamLogoSrc(teamId) {
      if (!teamId) return '';
      return TEAM_LOGO_SRC[teamId] || '';
    }

    function teamShortLabel(meta, teamId) {
      const t = meta.teams.find((x) => x.id === teamId);
      if (!t) return '?';
      return (t.short && String(t.short).trim()) || (t.name && String(t.name).slice(0, 2)) || '?';
    }

    function teamLogoFrameHtml(meta, teamId, sizeKey, fallbackTone = 'light') {
      const tid = escapeHtml(teamId || '');
      const name = escapeHtml(teamName(meta, teamId));
      const short = escapeHtml(teamShortLabel(meta, teamId));
      const src = escapeHtml(teamLogoSrc(teamId));
      const sizeClass =
        sizeKey === 'next'
          ? 'standings-logo-frame--next'
          : sizeKey === 'schedule'
            ? 'standings-logo-frame--schedule'
            : 'standings-logo-frame--team';
      const fb =
        fallbackTone === 'dark'
          ? 'hidden absolute inset-0 flex items-center justify-center rounded-full bg-zinc-800 text-white text-[10px] font-extrabold leading-none'
          : 'hidden absolute inset-0 flex items-center justify-center rounded-full bg-zinc-200 text-[10px] font-extrabold text-zinc-600 leading-none tracking-tight';
      return `<span class="standings-logo-frame ${sizeClass} relative inline-flex items-center justify-center shrink-0" data-team-id="${tid}" title="${name}">
        <img src="${src}" alt="" class="standings-logo-img" decoding="async" onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden')" />
        <span class="${fb}">${short}</span>
      </span>`;
    }

    function formatTeamNameWithShort(name, short, inline = true) {
      const n = escapeHtml(name || '');
      const s = short && String(short).trim();
      if (!s) return `<span class="font-semibold text-zinc-900">${n}</span>`;
      const shortSpan = `<span class="text-[11px] font-semibold text-indigo-700/85 tracking-tight">(${escapeHtml(s)})</span>`;
      if (inline) {
        return `<span class="font-semibold text-zinc-900">${n}</span> ${shortSpan}`;
      }
      return `<span class="block font-semibold text-zinc-900 leading-tight">${n}</span>${shortSpan}`;
    }

    function formatStandingsTeamCell(meta, t) {
      const tid = escapeHtml(t.id || '');
      const nameHtml = formatTeamNameWithShort(t.name, t.short, true);
      return `<div class="flex items-center gap-2.5 min-w-0 justify-start text-left" data-team-id="${tid}">
      ${teamLogoFrameHtml(meta, t.id, 'team')}
      <span class="min-w-0 leading-snug">${nameHtml}</span>
    </div>`;
    }

    function formatSetRecordHtml(setW, setL) {
      const sw = Number(setW) || 0;
      const sl = Number(setL) || 0;
      if (sw === 0 && sl === 0) {
        return '<span class="text-zinc-400 tabular-nums text-[11px]">0승 0패</span>';
      }
      return `<span class="tabular-nums text-[11px] sm:text-sm leading-tight"><span class="text-emerald-800 font-semibold">${sw}</span><span class="text-zinc-600 font-medium">승</span> <span class="text-zinc-700 font-semibold">${sl}</span><span class="text-zinc-600 font-medium">패</span></span>`;
    }

    function formatNextOpponentCell(meta, next) {
      if (!next) {
        return '<td class="px-2 sm:px-3 py-2.5 text-center align-middle"><span class="text-zinc-300 text-[11px]">—</span></td>';
      }
      const tip = escapeHtml(`${next.round}R · ${next.fixtureId} vs ${next.name}${next.short ? ' (' + next.short + ')' : ''}`);
      const nameLine = escapeHtml(next.name || next.opponentId || '');
      const shortRaw = next.short && String(next.short).trim();
      const shortLine = shortRaw
        ? `<span class="text-[9px] font-semibold text-indigo-700/85 leading-none truncate max-w-full">(${escapeHtml(shortRaw)})</span>`
        : '';
      return `<td class="px-2 sm:px-3 py-2.5 text-center align-middle" title="${tip}">
    <div class="inline-flex flex-col items-center gap-0.5 min-w-0 max-w-[6rem] mx-auto">
      ${teamLogoFrameHtml(meta, next.opponentId, 'next', 'dark')}
      <span class="text-[10px] font-semibold text-zinc-800 leading-tight text-center line-clamp-2 max-w-full">${nameLine}</span>
      ${shortLine}
      <span class="text-[9px] text-zinc-400 tabular-nums leading-none">${next.round}R</span>
    </div>
  </td>`;
    }

    function formatNextOpponentMobileBlock(meta, next) {
      if (!next) {
        return '<span class="text-zinc-400 text-xs">다음 대전 없음</span>';
      }
      const tip = escapeHtml(`${next.round}R · ${next.fixtureId} vs ${next.name}${next.short ? ' (' + next.short + ')' : ''}`);
      const nameLine = escapeHtml(next.name || next.opponentId || '');
      const shortRaw = next.short && String(next.short).trim();
      const shortLine = shortRaw
        ? `<span class="text-[10px] font-semibold text-indigo-700/85">(${escapeHtml(shortRaw)})</span>`
        : '';
      return `<div class="standings-mobile-next min-w-0 flex-1" title="${tip}">
      ${teamLogoFrameHtml(meta, next.opponentId, 'next', 'dark')}
      <div class="min-w-0 flex-1">
        <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-wide mb-0.5">다음 대전</div>
        <div class="text-sm font-semibold text-zinc-900 leading-tight">${nameLine} ${shortLine}</div>
        <div class="text-[11px] text-zinc-500 tabular-nums mt-0.5">${next.round}라운드</div>
      </div>
    </div>`;
    }

    function formatStandingsMobileCard(meta, t, rank, hasAny, isPo, next) {
      const poClass = isPo ? ' standings-mobile-card--po' : '';
      const seriesSum = t.seriesW + t.seriesL;
      const recentHtml = formatRecentSeriesHtml(t.recentWL);
      const sparkHtml = rankSparklineSvg(t.rankHist, meta.teams.length);
      return `
    <article class="standings-mobile-card${poClass}" data-team-id="${escapeHtml(t.id || '')}">
      <div class="flex items-center gap-3 mb-3">
        <div class="shrink-0 w-8 flex justify-center">${rankCellHtml(rank, hasAny)}</div>
        <div class="min-w-0 flex-1">${formatStandingsTeamCell(meta, t)}</div>
        ${isPo ? '<span class="shrink-0 text-[9px] font-bold uppercase tracking-wide text-indigo-700 bg-indigo-50 border border-indigo-200/80 px-1.5 py-0.5 rounded">PO</span>' : ''}
      </div>
      <div class="grid grid-cols-3 gap-2 mb-2">
        <div class="standings-mobile-stat">
          <span class="standings-mobile-stat-label">대전</span>
          <span class="text-sm font-bold text-zinc-900 tabular-nums">${t.seriesW}<span class="text-zinc-400 font-medium">승</span> ${t.seriesL}<span class="text-zinc-400 font-medium">패</span></span>
          <div class="text-[10px] text-zinc-500 tabular-nums mt-0.5">${seriesSum}경기</div>
        </div>
        <div class="standings-mobile-stat">

          <div class="text-sm">${formatSetRecordHtml(t.setW, t.setL)}</div>
        </div>
        <div class="standings-mobile-stat">
          <span class="standings-mobile-stat-label">득실</span>
          <div class="text-sm">${formatSetDiffHtml(t.setW, t.setL)}</div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2 mb-3">
        <div class="standings-mobile-stat">
          <span class="standings-mobile-stat-label">개인전</span>
          <div class="text-sm">${formatSetRecordHtml(t.soloW, t.soloL)}</div>
        </div>
        <div class="standings-mobile-stat">
          <span class="standings-mobile-stat-label">팀전</span>
          <div class="text-sm">${formatSetRecordHtml(t.teamW, t.teamL)}</div>
        </div>
      </div>
      <div class="flex flex-wrap items-center justify-between gap-2 pt-2 border-t border-zinc-100">
        <div class="flex flex-col gap-0.5">
          <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wide">최근</span>
          ${recentHtml}
        </div>
        <div class="flex flex-col items-end gap-0.5 shrink-0">
          <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wide">순위 추이</span>
          ${sparkHtml}
        </div>
      </div>
      <div class="mt-2.5 pt-2.5 border-t border-zinc-100">
        ${formatNextOpponentMobileBlock(meta, next)}
      </div>
    </article>`;
    }

    function renderStandings(meta, analysis, nextByTeam) {
      const { acc, recent, rankHist } = analysis;
      const tbody = document.getElementById('standingsBody');
      const nTeams = meta.teams.length;
      const rows = meta.teams
        .map((t) => ({
          ...t,
          ...acc[t.id],
          recentWL: recent[t.id] || [],
          rankHist: rankHist[t.id] || [],
        }))
        .sort(compareStandingRow);
      const ranks = assignStandingsRanks(rows);
      const leagueStarted = rows.some((r) => r.seriesW + r.seriesL + r.setW + r.setL > 0);
      tbody.innerHTML = rows
        .map((t, idx) => {
          const hasAny = t.seriesW + t.seriesL + t.setW + t.setL > 0;
          const rank = ranks[idx];
          const seriesSum = t.seriesW + t.seriesL;
          const poClass = leagueStarted && rank <= PLAYOFF_SPOTS ? ' standings-row--po' : '';
          return `
        <tr class="standings-row border-b border-zinc-100/80 transition-colors${poClass}">
          <td class="px-2 sm:px-3 py-2.5 text-center align-middle">${rankCellHtml(rank, hasAny)}</td>
          <td class="px-2 sm:px-3 py-2 align-middle">${formatStandingsTeamCell(meta, t)}</td>
          <td class="px-2 sm:px-3 py-2.5 text-center align-middle tabular-nums text-zinc-500">${seriesSum}</td>
          <td class="px-2 sm:px-3 py-2.5 text-center align-middle tabular-nums text-zinc-800 font-medium">${t.seriesW}</td>
          <td class="px-2 sm:px-3 py-2.5 text-center align-middle tabular-nums text-zinc-500">${t.seriesL}</td>
          <td class="px-2 sm:px-3 py-2.5 text-center align-middle">${formatSetRecordHtml(t.setW, t.setL)}</td>
          <td class="px-2 sm:px-3 py-2.5 text-center align-middle">${formatSetRecordHtml(t.soloW, t.soloL)}</td>
          <td class="px-2 sm:px-3 py-2.5 text-center align-middle">${formatSetRecordHtml(t.teamW, t.teamL)}</td>
          <td class="px-2 sm:px-3 py-2.5 text-right align-middle">${formatSetDiffHtml(t.setW, t.setL)}</td>
          <td class="px-2 sm:px-3 py-2.5 align-middle">${formatRecentSeriesHtml(t.recentWL)}</td>
          ${formatNextOpponentCell(meta, nextByTeam[t.id])}
          <td class="px-2 sm:px-3 py-2.5 text-center align-middle">${rankSparklineSvg(t.rankHist, nTeams)}</td>
        </tr>`;
        })
        .join('');

      const mobileRoot = document.getElementById('standingsMobile');
      if (mobileRoot) {
        mobileRoot.innerHTML = rows
          .map((t, idx) => {
            const hasAny = t.seriesW + t.seriesL + t.setW + t.setL > 0;
            const rank = ranks[idx];
            const isPo = leagueStarted && rank <= PLAYOFF_SPOTS;
            return formatStandingsMobileCard(meta, t, rank, hasAny, isPo, nextByTeam[t.id]);
          })
          .join('');
      }
    }

    function parseScheduleMdDate(str, year) {
      const m = String(str).trim().match(/^(\d{1,2})\/(\d{1,2})$/);
      if (!m) return null;
      const month = parseInt(m[1], 10) - 1;
      const day = parseInt(m[2], 10);
      if (month < 0 || month > 11 || day < 1 || day > 31) return null;
      const d = new Date(year, month, day);
      if (d.getFullYear() !== year || d.getMonth() !== month || d.getDate() !== day) return null;
      return d;
    }

    function pairMod5KeyForRound(roundNum) {
      const r = Number(roundNum);
      if (!Number.isFinite(r)) return null;
      const mod = ((r % 5) + 5) % 5;
      return mod === 0 ? '0' : String(mod);
    }

    function presetPairRowsForRound(roundNum, matchupPreset) {
      if (!matchupPreset) return null;
      if (matchupPreset.pairsByRound && typeof matchupPreset.pairsByRound === 'object') {
        const key = String(Number(roundNum));
        const rows = matchupPreset.pairsByRound[key];
        if (Array.isArray(rows)) return rows;
      }
      if (!matchupPreset.pairsByRoundMod5) return null;
      const key = pairMod5KeyForRound(roundNum);
      if (key == null) return null;
      const rows = matchupPreset.pairsByRoundMod5[key];
      return Array.isArray(rows) ? rows : null;
    }

    function unorderedPairKey(teamIds) {
      const [a, b] = teamIds || [];
      if (!a || !b) return '';
      return a < b ? `${a}\u0000${b}` : `${b}\u0000${a}`;
    }

    /** pairsByRound(또는 pairsByRoundMod5) 한 라운드에서 해당 팀쌍이 몇 번째 줄인지(없으면 999). */
    function presetSlotIndexForTeams(teamIds, roundNum, matchupPreset) {
      const rows = presetPairRowsForRound(roundNum, matchupPreset);
      if (!rows) return 999;
      const want = unorderedPairKey(teamIds);
      if (!want) return 999;
      for (let i = 0; i < rows.length; i++) {
        if (unorderedPairKey(rows[i]) === want) return i;
      }
      return 999;
    }

    function matchupSortKeyFromId(id) {
      const m = String(id || '').match(/-m(\d+)$/);
      return m ? parseInt(m[1], 10) : 999;
    }

    /**
     * 일정 카드 표시 순서: matchupPreset.pairsByRound(또는 pairsByRoundMod5) 행 순 → 같은 슬롯이면 날짜 → fixture id.
     * JSON 배열 순서가 일정표와 어긋나도 팀·날짜 붙은 객체는 그대로 두고 줄만 맞춥니다.
     */
    function sortMatchupsForScheduleDisplay(matchups, roundNum, fixtures) {
      const mp = fixtures && fixtures.matchupPreset;
      return [...(matchups || [])].sort((a, b) => {
        const ia = presetSlotIndexForTeams(a.teamIds, roundNum, mp);
        const ib = presetSlotIndexForTeams(b.teamIds, roundNum, mp);
        if (ia !== ib) return ia - ib;
        const da = parseScheduleMdDate(String(a.date || '').trim(), SCHEDULE_DATE_YEAR);
        const db = parseScheduleMdDate(String(b.date || '').trim(), SCHEDULE_DATE_YEAR);
        const ta = da ? da.getTime() : null;
        const tb = db ? db.getTime() : null;
        if (ta != null && tb != null && ta !== tb) return ta - tb;
        if (ta != null && tb == null) return -1;
        if (ta == null && tb != null) return 1;
        return matchupSortKeyFromId(a.id) - matchupSortKeyFromId(b.id);
      });
    }

    /** "5/26" → 날짜 + 한글 요일 한 글자 (연도는 SCHEDULE_DATE_YEAR) */
    function formatScheduleMatchupDateHeading(raw) {
      const trimmed = String(raw).trim();
      if (!trimmed) return '';
      const dt = parseScheduleMdDate(trimmed, SCHEDULE_DATE_YEAR);
      if (!dt) return `<span class="text-indigo-900">${escapeHtml(trimmed)}</span>`;
      const wd = SCHEDULE_WEEKDAY_KO[dt.getDay()];
      return `<span class="tabular-nums text-indigo-900">${escapeHtml(trimmed)}</span><span class="text-zinc-500 font-bold"> ${escapeHtml(wd)}</span>`;
    }

    function formatScheduleSlotTierCell(s) {
      if (!s) return '<span class="text-zinc-300">—</span>';
      const f = String(s.format || '').toLowerCase();
      if (f === '2v2') return '<span class="text-zinc-600 font-semibold">2:2</span>';
      if (f === '3v3') return '<span class="text-zinc-600 font-semibold">3:3</span>';
      if (f === '1v1' || f === '') {
        return s.tierLine
          ? `<span class="text-zinc-800">${escapeHtml(s.tierLine)}</span>`
          : '<span class="text-zinc-400">—</span>';
      }
      return `<span class="text-zinc-700">${escapeHtml(s.format || '—')}</span>`;
    }

    function formatScheduleSlotMapCell(s) {
      if (!s) return '<span class="text-zinc-300">—</span>';
      const map = s.map ? escapeHtml(s.map) : '—';
      const cap =
        s.pointCapPerTeam != null
          ? `<span class="text-zinc-600 tabular-nums font-medium">(${escapeHtml(String(s.pointCapPerTeam))})</span>`
          : '';
      return `<span class="font-semibold text-zinc-900">${map}</span>${cap}`;
    }

    function formatScheduleSlotRow(s) {
      if (!s) {
        return `<div class="schedule-slot-grid schedule-slot-grid--row">
          <div class="schedule-slot-cell schedule-slot-cell--seq"><span class="text-zinc-300">·</span></div>
          <div class="schedule-slot-cell schedule-slot-cell--tier"><span class="text-zinc-300">—</span></div>
          <div class="schedule-slot-cell schedule-slot-cell--map"></div>
        </div>`;
      }
      return `<div class="schedule-slot-grid schedule-slot-grid--row">
        <div class="schedule-slot-cell schedule-slot-cell--seq"><span class="font-mono font-bold text-indigo-700 tabular-nums text-[11px]">${s.slot}</span></div>
        <div class="schedule-slot-cell schedule-slot-cell--tier">${formatScheduleSlotTierCell(s)}</div>
        <div class="schedule-slot-cell schedule-slot-cell--map">${formatScheduleSlotMapCell(s)}</div>
      </div>`;
    }

    function scheduleRankBadgeHtml(rank, title) {
      if (rank == null) return '';
      const t = escapeHtml(title != null ? String(title) : `${rank}위`);
      let extra = '';
      if (rank === 1) extra = ' schedule-rank-badge--1';
      else if (rank === 2) extra = ' schedule-rank-badge--2';
      else if (rank === 3) extra = ' schedule-rank-badge--3';
      return `<span class="schedule-rank-badge${extra}" title="${t}">${escapeHtml(String(rank))}</span>`;
    }

    function formatScheduleMatchupSide(meta, teamId, rankMap) {
      const name = escapeHtml(teamName(meta, teamId));
      const rank = rankMap[teamId];
      const badge = scheduleRankBadgeHtml(rank, `${rank}위`);
      return `<div class="schedule-matchup-team">
        ${teamLogoFrameHtml(meta, teamId, 'schedule')}
        <div class="schedule-matchup-meta">
          ${badge}<span class="font-semibold">${name}</span>
        </div>
      </div>`;
    }

    function formatScheduleMatchupWithRanks(meta, m, rankMap) {
      const [idA, idB] = m.teamIds || [];
      return `<div class="schedule-matchup">
        ${formatScheduleMatchupSide(meta, idA, rankMap)}
        <span class="schedule-matchup-vs">vs</span>
        ${formatScheduleMatchupSide(meta, idB, rankMap)}
      </div>`;
    }

    function countMatchupSetWins(mu) {
      let a = 0;
      let b = 0;
      for (const sl of mu?.slots || []) {
        if (sl.winnerTeamIndex === 1) a++;
        else if (sl.winnerTeamIndex === 2) b++;
      }
      return [a, b];
    }

    function displayedScheduleSetScores(mu) {
      const s = mu && mu.series;
      const [ca, cb] = countMatchupSetWins(mu);
      if (s && s.setScoreTeamA != null && s.setScoreTeamB != null) {
        const na = Number(s.setScoreTeamA);
        const nb = Number(s.setScoreTeamB);
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return [na, nb];
      }
      return [ca, cb];
    }

    function matchupMvpName(mu) {
      const raw = mu?.series?.mvp ?? mu?.mvp ?? null;
      if (!raw) return '';
      if (typeof raw === 'string') return raw.trim();
      return String(raw.displayName || raw.playerName || '').trim();
    }

    function formatScheduleResultHtml(meta, m, mu) {
      if (!mu) return '';
      const sw = mu.series && mu.series.winnerTeamIndex;
      const [scoreA, scoreB] = displayedScheduleSetScores(mu);
      const hasScore = scoreA + scoreB > 0;
      if (sw !== 1 && sw !== 2 && !hasScore) return '';

      const [tidA, tidB] = m.teamIds || [];
      const winnerName = sw === 1 ? teamName(meta, tidA) : sw === 2 ? teamName(meta, tidB) : '';
      const scoreAClass = sw === 1 || (!sw && scoreA > scoreB) ? 'text-emerald-700' : 'text-zinc-500';
      const scoreBClass = sw === 2 || (!sw && scoreB > scoreA) ? 'text-emerald-700' : 'text-zinc-500';
      const mvp = matchupMvpName(mu);
      const mvpHtml = mvp
        ? `<span class="inline-flex items-center gap-1 rounded-full bg-amber-50 px-2 py-0.5 text-[10px] sm:text-[11px] font-bold text-amber-800 border border-amber-200"><span>MVP</span><span>${escapeHtml(mvp)}</span></span>`
        : '';
      const winnerHtml = winnerName
        ? `<span class="schedule-result-winner text-emerald-700">${escapeHtml(winnerName)} 승</span>`
        : '<span class="schedule-result-winner text-amber-700">결과 입력 중</span>';

      return `<div class="schedule-result-block flex flex-col items-center gap-2">
        <div class="schedule-result-pill">
          <span class="schedule-result-label">결과</span>
          <span class="schedule-result-score">
            <span class="${scoreAClass}">${scoreA}</span><span class="text-zinc-300 mx-1">:</span><span class="${scoreBClass}">${scoreB}</span>
          </span>
        </div>
        <div class="flex flex-wrap items-center justify-center gap-1.5">
          ${winnerHtml}
          ${mvpHtml}
        </div>
      </div>`;
    }

    function renderScheduleSlotPlanCard(slots) {
      const headerRow = `<div class="schedule-slot-grid schedule-slot-grid--head" role="row">
        <div class="schedule-slot-cell schedule-slot-cell--seq">순서</div>
        <div class="schedule-slot-cell schedule-slot-cell--tier">티어</div>
        <div class="schedule-slot-cell schedule-slot-cell--map">맵</div>
      </div>`;
      const sorted = [...(slots || [])].sort((a, b) => (a.slot || 0) - (b.slot || 0));
      const lines = sorted
        .map((s) => `<div class="schedule-slot-line">${formatScheduleSlotRow(s)}</div>`)
        .join('');
      return `
        <div class="schedule-card schedule-card--maps overflow-hidden">
          <div class="px-2.5 py-1.5 text-[10px] font-bold text-indigo-900/90 bg-indigo-50/95 border-b border-indigo-100/80 text-center">세트 · 맵</div>
          ${headerRow}
          <div>${lines || '<div class="px-3 py-6 text-center text-xs text-zinc-400">세트 구성 없음</div>'}</div>
        </div>`;
    }

    function renderScheduleMatchupCard(meta, m, rankMap, index1, h2hWins, resultMu) {
      const inner = formatScheduleMatchupWithRanks(meta, m, rankMap);
      const [tid0, tid1] = m.teamIds || [];
      const h2hHtml = formatScheduleHeadToHeadHtml(meta, tid0, tid1, h2hWins);
      const resultHtml = formatScheduleResultHtml(meta, m, resultMu);
      const raw = m.date != null && String(m.date).trim() ? String(m.date).trim() : '';
      const head = raw
        ? `<div class="text-center leading-tight flex items-center justify-center gap-1.5">${formatScheduleMatchupDateHeading(raw)}${resultHtml ? '<span class="rounded-full bg-emerald-100 text-emerald-800 px-1.5 py-0.5 text-[9px] font-bold">완료</span>' : ''}</div>`
        : `<div class="text-center text-[11px] font-bold text-zinc-500">대전 ${index1}</div>`;
      return `
        <div class="schedule-card schedule-card--match flex flex-col justify-center min-h-[6.25rem] items-stretch text-center">
          <div class="mb-1.5">${head}</div>
          <div class="min-w-0 flex justify-center w-full">${inner}</div>
          ${h2hHtml}
          ${resultHtml}
        </div>`;
    }

    function chunkArray(arr, size) {
      const out = [];
      for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
      return out;
    }

    function renderScheduleRoundPanel(meta, fixtures, roundDocs, r) {
      const matchups = sortMatchupsForScheduleDisplay(r.matchups, r.round, fixtures);
      const slots = r.slotPlan || [];
      const prevR = (r.round ?? 1) - 1;
      const { rankMap } = standingsAfterThroughRound(meta, fixtures, roundDocs, prevR);
      const showRanks = allScheduledRoundsSeriesCompleteThrough(fixtures, roundDocs, prevR);
      const effectiveRankMap = showRanks ? rankMap : {};
      const mapCard = renderScheduleSlotPlanCard(slots);
      const h2hWins = buildSeriesHeadToHeadBeforeRound(fixtures, roundDocs, r.round);
      const roundDoc = (roundDocs || []).find((doc) => doc && doc.round === r.round);
      const resultByFixture = new Map((roundDoc?.matchups || []).map((mu) => [mu.fixtureId, mu]));
      const matchCards = matchups
        .map((m, i) => renderScheduleMatchupCard(meta, m, effectiveRankMap, i + 1, h2hWins, resultByFixture.get(m.id)))
        .join('');
      const rankNote = showRanks
        ? '<p class="text-[10px] text-zinc-500 leading-snug text-center">숫자 뱃지: 직전 라까지 확정된 순위.</p>'
        : '';
      return `
        <div class="schedule-round-shell overflow-hidden min-w-0 flex flex-col h-full">
          <div class="px-3 py-2.5 border-b border-zinc-200/80 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white text-center shrink-0">
            <span class="text-sm font-bold tracking-tight tabular-nums">${r.round}라운드</span>
          </div>
          <div class="p-2 sm:p-3 space-y-2 sm:space-y-3 flex-1 min-h-0 flex flex-col">
            <div class="schedule-round-body">
              ${mapCard}
              <div class="schedule-round-matches">${matchCards || '<div class="schedule-card px-3 py-4 text-center text-xs text-zinc-400">대전 없음</div>'}</div>
            </div>
            ${rankNote}
          </div>
        </div>`;
    }

    function renderSchedule(meta, fixtures, roundDocs) {
      const root = document.getElementById('scheduleRoot');
      const rounds = [...(fixtures.rounds || [])].sort((a, b) => (a.round || 0) - (b.round || 0));
      if (!rounds.length) {
        root.innerHTML = '<p class="text-sm text-zinc-500">일정 데이터가 없습니다.</p>';
        return;
      }
      const SCHEDULE_ROUNDS_PER_CHUNK = 5;
      const chunks = chunkArray(rounds, SCHEDULE_ROUNDS_PER_CHUNK);
      root.innerHTML = chunks
        .map((chunk) => {
          const startR = chunk[0].round;
          const endR = chunk[chunk.length - 1].round;
          const panels = chunk.map((rd) => renderScheduleRoundPanel(meta, fixtures, roundDocs, rd)).join('');
          return `
        <section class="schedule-chunk mb-8 last:mb-0">
          <h3 class="text-sm font-bold text-zinc-900 mb-3 flex flex-wrap items-center justify-center gap-2">
            <span class="rounded-md bg-indigo-100 text-indigo-900 px-2 py-0.5 tabular-nums">${startR}~${endR}</span>
            <span>라운드</span>
          </h3>
          <div class="grid grid-cols-1 gap-3 min-w-0 sm:gap-3">
            ${panels}
          </div>
        </section>`;
        })
        .join('');
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const [meta, fixtures] = await Promise.all([
          loadJson('data/s11/meta.json'),
          loadJson('data/s11/fixtures.json'),
        ]);
        const roundDocs = await loadAllRoundResults(10, fixtures);
        const analysis = buildStandingsAnalysis(meta, fixtures, roundDocs);
        const nextByTeam = computeNextOpponents(meta, fixtures, roundDocs);
        renderStandings(meta, analysis, nextByTeam);
        renderSchedule(meta, fixtures, roundDocs);
      } catch (e) {
        console.error(e);
        document.getElementById('standingsBody').innerHTML =
          `<tr><td colspan="11" class="px-4 py-4 text-red-600">${escapeHtml(e.message)}</td></tr>`;
        const mobileRoot = document.getElementById('standingsMobile');
        if (mobileRoot) {
          mobileRoot.innerHTML = `<p class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800">${escapeHtml(e.message)}</p>`;
        }
      }
    });
  </script>
</body>
</html>
